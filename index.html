<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haomin Tsai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #fafafa;
            min-height: 100vh;
            padding: 60px 20px;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        .profile {
            text-align: left;
            margin-bottom: 48px;
            padding-bottom: 32px;
            border-bottom: 1px solid #e5e5e5;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 16px;
        }

        .name {
            font-size: 1.5em;
            font-weight: 600;
            color: #000;
            margin-bottom: 4px;
        }

        .bio {
            color: #666;
            font-size: 1em;
        }

        .section-title {
            font-size: 1em;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .projects {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .project-card {
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .project-name {
            font-size: 1.1em;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .project-name a {
            color: #0066cc;
            text-decoration: none;
        }

        .project-name a:hover {
            text-decoration: underline;
        }

        .project-desc {
            color: #666;
            font-size: 0.9em;
        }

        .footer {
            margin-top: 48px;
            color: #999;
            font-size: 0.85em;
        }

        .footer a {
            color: #666;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body {
                padding: 40px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <img src="https://avatars.githubusercontent.com/u/17266513?v=4" alt="Avatar" class="avatar">
            <h1 class="name">Haomin Tsai</h1>
            <p class="bio">openEuler @ Huawei · HangZhou</p>
        </div>

        <h2 class="section-title">Projects</h2>
        
        <div class="projects">
            <div class="project-card">
                <h3 class="project-name">
                    <a href="https://github.com/jshachm/pi-rs" target="_blank">pi-rs</a>
                </h3>
                <p class="project-desc">基于pi-mono，rust轻量化版本</p>
            </div>

            <div class="project-card">
                <h3 class="project-name">
                    <a href="https://github.com/jshachm/chronoh" target="_blank">chronoh</a>
                </h3>
                <p class="project-desc">遵循harness原则，长时运行agent任务的框架，集成pi-rs</p>
            </div>
        </div>

        <footer class="footer">
            <a href="https://github.com/jshachm">GitHub</a>
        </footer>
    </div>
</body>
</html>
