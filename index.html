<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haomin Tsai | Personal Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .profile {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #667eea;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .name {
            font-size: 2.5em;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .title {
            font-size: 1.2em;
            color: #667eea;
            margin-bottom: 15px;
        }

        .bio {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .location {
            color: #888;
            font-size: 0.9em;
        }

        .section-title {
            font-size: 1.8em;
            font-weight: 600;
            color: white;
            margin-bottom: 25px;
            text-align: center;
        }

        .projects {
            display: grid;
            gap: 25px;
        }

        .project-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .project-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .project-name {
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
        }

        .project-name a {
            color: inherit;
            text-decoration: none;
        }

        .project-name a:hover {
            color: #667eea;
        }

        .lang-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #666;
        }

        .lang-dot {
            width: 12px;
            height: 12px;
            background: #dea584;
            border-radius: 50%;
        }

        .project-desc {
            color: #666;
            font-size: 1em;
            line-height: 1.7;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
        }

        .footer a {
            color: white;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body {
                padding: 20px 15px;
            }
            .profile {
                padding: 25px;
            }
            .name {
                font-size: 1.8em;
            }
            .project-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <img src="https://avatars.githubusercontent.com/u/17266513?v=4" alt="Avatar" class="avatar">
            <h1 class="name">Haomin Tsai</h1>
            <p class="title">Container Stack @ Huawei Ltd</p>
            <p class="bio">Container Stack</p>
            <p class="location">📍 HangZhou</p>
        </div>

        <h2 class="section-title">Projects</h2>
        
        <div class="projects">
            <div class="project-card">
                <div class="project-header">
                    <h3 class="project-name">
                        <a href="https://github.com/jshachm/pi-rs" target="_blank">pi-rs</a>
                    </h3>
                    <span class="lang-badge">
                        <span class="lang-dot"></span>
                        Rust
                    </span>
                </div>
                <p class="project-desc">基于pi-mono，rust轻量化版本</p>
            </div>

            <div class="project-card">
                <div class="project-header">
                    <h3 class="project-name">
                        <a href="https://github.com/jshachm/chronoh" target="_blank">chronoh</a>
                    </h3>
                    <span class="lang-badge">
                        <span class="lang-dot"></span>
                        Rust
                    </span>
                </div>
                <p class="project-desc">遵循harness原则，长时运行agent任务的框架，集成pi-rs</p>
            </div>
        </div>

        <footer class="footer">
            <p>
                <a href="https://github.com/jshachm">GitHub</a> · 
                <a href="https://github.com/jshachm/pi-rs">pi-rs</a> · 
                <a href="https://github.com/jshachm/chronoh">chronoh</a>
            </p>
        </footer>
    </div>
</body>
</html>
